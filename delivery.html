<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Delivery - Mixam's Autos </title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #1C1C1C; line-height: 1.6; }
    .delivery-page {
      max-width: 720px;
      margin: 40px auto;
      padding: 40px 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { text-align: center; margin-bottom: 10px; color: #0B1F3B; }
    .subtitle { text-align: center; color: #555; margin-bottom: 40px; }
    .form-section { margin-bottom: 40px; }
    .form-section h3 { margin-bottom: 20px; color: #0B1F3B; border-bottom: 2px solid #E5E7EB; padding-bottom: 10px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14.5px; }
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    .checkbox-group { margin: 20px 0; }
    .checkbox-group label { display: flex; align-items: flex-start; gap: 10px; font-weight: normal; line-height: 1.4; }
    input[type="checkbox"] { width: auto; accent-color: #2563EB; margin-top: 4px; }
    .btn {
      width: 100%;
      height: 56px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn:hover { background: #1E40AF; }
    .note { font-size: 14px; color: #666; text-align: center; margin-top: 25px; }
    @media (max-width: 600px) {
      .delivery-page { margin: 20px 10px; padding: 25px 15px; }
    }
  </style>
</head>
<body>
  <div class="delivery-page">
    <h1>Delivery & Handover Details</h1>
    <p class="subtitle">Mixam's Autos – Request Delivery</p>

    <form action="https://formspree.io/f/xqegvzev" method="POST">
      <div class="form-section">
        <h3>Personal Details</h3>
        <label>Full Name</label>
        <input type="text" name="full_name" required>
        <label>Email Address</label>
        <input type="email" name="email" required>
        <label>Phone Number</label>
        <input type="tel" name="phone" required>
      </div>

      <div class="form-section">
        <h3>Delivery Information</h3>
        <label>Full Delivery Address</label>
        <input type="text" name="delivery_address" required>
        <label>ZIP Code</label>
        <input type="text" name="zip" required>
        <label>Preferred Delivery Date</label>
        <input type="date" name="delivery_date" required>
        <label>Preferred Time Slot</label>
        <select name="time_slot" required>
          <option value="">Select...</option>
          <option value="Morning">Morning (9am–12pm)</option>
          <option value="Afternoon">Afternoon (12pm–4pm)</option>
          <option value="Evening">Evening (4pm–7pm)</option>
        </select>
      </div>

      <div class="form-section">
        <h3>Vehicle Details</h3>
        <label>Vehicle Name</label>
        <input type="text" name="vehicle" placeholder="e.g. 2012 Seat Mii" required>
        <label>Order Reference (optional)</label>
        <input type="text" name="order_reference">
      </div>

      <div class="form-section">
        <h3>Trade-In</h3>
        <label>Are you trading in a vehicle?</label>
        <select name="trade_in" required>
          <option value="">Select...</option>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>

        <div id="tradeInDetails" style="display:none;">
          <label>Trade-in Vehicle (Make/Model)</label>
          <input type="text" name="trade_in_vehicle">
          <label>Registration Number</label>
          <input type="text" name="reg_number">
          <div class="checkbox-group">
            <label><input type="checkbox" name="trade_in_ready"> I confirm the trade-in vehicle will be available with keys and documents.</label>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>Payment Confirmation</h3>
        <label>Have you completed your initial payment?</label>
        <select name="payment_done" required>
          <option value="">Select...</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
        <label>Payment Reference (if paid)</label>
        <input type="text" name="payment_reference">
      </div>

      <div class="form-section">
        <div class="checkbox-group">
          <label><input type="checkbox" name="confirm_details" required> I confirm the details provided are correct and I am ready for delivery once payment is confirmed.</label>
        </div>
      </div>

      <button type="submit" class="btn">Submit Delivery Details</button>
    </form>

    <p class="note">
      After submission, our team will contact you within 24 hours to confirm delivery arrangements.
    </p>
  </div>

  <script>
    document.querySelector('select[name="trade_in"]').addEventListener('change', function() {
      document.getElementById('tradeInDetails').style.display = this.value === "Yes" ? 'block' : 'none';
    });
  </script>
</body>
</html>
