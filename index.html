<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mixam's Autos - Inventory</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <header>
    <h1>Mixam's Autos</h1>
    <p>Quality Used & New Vehicles – Great Deals Every Day</p>
  </header>

  <main>
    <section class="filters">
      <h2>Our Inventory</h2>
      <div class="filter-controls">
        <label>Sort by:</label>
        <select id="sortSelect">
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="year-desc">Newest First</option>
        </select>
      </div>
    </section>

    <section class="car-grid" id="carGrid">
      <!-- Cars added via JS -->
    </section>
  </main>

  <!-- Modal for View Details -->
  <div id="carModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <img id="modalImg" src="" alt="Car Photo">
      <div id="thumbnails" class="thumbnails"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalFullDesc"></p>
      <a id="modalWhatsApp" href="#" class="btn btn-secondary" target="_blank" style="margin-top:1.5rem; display:block; text-align:center;">Send Message via WhatsApp</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Mixam's Autos. All rights reserved. | Contact: your@email.com | WhatsApp: +1234567890</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
