<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply for Car Finance - Mixam's Autos </title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #1C1C1C; line-height: 1.6; }
    .finance-page {
      max-width: 720px;
      margin: 40px auto;
      padding: 40px 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { text-align: center; margin-bottom: 10px; color: #0B1F3B; }
    .subtitle { text-align: center; color: #555; margin-bottom: 40px; }
    .form-section { margin-bottom: 40px; }
    .form-section h3 { margin-bottom: 20px; color: #0B1F3B; border-bottom: 2px solid #E5E7EB; padding-bottom: 10px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14.5px; }
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    .checkbox-group { margin: 20px 0; }
    .checkbox-group label { display: flex; align-items: flex-start; gap: 10px; font-weight: normal; line-height: 1.4; }
    input[type="checkbox"] { width: auto; accent-color: #2563EB; margin-top: 4px; }
    .btn {
      width: 100%;
      height: 56px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn:hover { background: #1E40AF; }
    @media (max-width: 600px) {
      .finance-page { margin: 20px 10px; padding: 25px 15px; }
    }
  </style>
</head>
<body>
  <div class="finance-page">
    <h1>Apply for Car Finance</h1>
    <p class="subtitle">UK Car Finance Application – Simple & Secure</p>

    <form action="https://formspree.io/f/xqegvzev" method="POST">
      
      <!-- 1. Personal Details -->
      <div class="form-section">
        <h3>Personal Details</h3>
        <label>Full Name</label>
        <input type="text" name="full_name" required>

        <label>Date of Birth</label>
        <input type="date" name="dob" required>

        <label>Nationality</label>
        <input type="text" name="nationality" value="British" required>

        <label>Marital Status (optional)</label>
        <select name="marital_status">
          <option value="">Select...</option>
          <option value="Single">Single</option>
          <option value="Married">Married</option>
          <option value="Divorced">Divorced</option>
          <option value="Widowed">Widowed</option>
        </select>

        <label>Number of Dependants (optional)</label>
        <input type="number" name="dependants" min="0">
      </div>

      <!-- 2. Address Details -->
      <div class="form-section">
        <h3>Address Details</h3>
        <label>Current Address</label>
        <input type="text" name="current_address" required>

        <label>Postcode</label>
        <input type="text" name="postcode" required>

        <label>How long at current address? (years/months)</label>
        <input type="text" name="time_at_address" placeholder="e.g. 2 years 6 months" required>

        <label>Previous Address (if less than 3 years at current address)</label>
        <input type="text" name="previous_address">
      </div>

      <!-- 3. Contact Details -->
      <div class="form-section">
        <h3>Contact Details</h3>
        <label>Mobile Number</label>
        <input type="tel" name="mobile" required>

        <label>Email Address</label>
        <input type="email" name="email" required>
      </div>

      <!-- 4. Employment Details -->
      <div class="form-section">
        <h3>Employment Details</h3>
        <label>Employment Status</label>
        <select name="employment_status" required>
          <option value="">Select...</option>
          <option value="Employed Full Time">Employed Full Time</option>
          <option value="Employed Part Time">Employed Part Time</option>
          <option value="Self Employed">Self Employed</option>
          <option value="Unemployed">Unemployed</option>
          <option value="Student">Student</option>
          <option value="Retired">Retired</option>
          <option value="On Benefits">On Benefits</option>
        </select>

        <label>Job Title</label>
        <input type="text" name="job_title">

        <label>Employer Name</label>
        <input type="text" name="employer_name">

        <label>Time in Current Job</label>
        <input type="text" name="time_in_job" placeholder="e.g. 18 months">

        <label>Monthly Income (Net / After Tax)</label>
        <input type="text" name="monthly_income" placeholder="£" required>
      </div>

      <!-- 5. Financial Information -->
      <div class="form-section">
        <h3>Financial Information</h3>
        <label>Monthly Rent or Mortgage Payment</label>
        <input type="text" name="monthly_rent_mortgage" placeholder="£">

        <label>Other Monthly Commitments (loans, credit cards, etc.)</label>
        <input type="text" name="other_commitments" placeholder="£">
      </div>

      <!-- 6. Vehicle & Finance Details - NOW EMPTY FOR CLIENT TO FILL -->
      <div class="form-section">
        <h3>Vehicle & Finance Details</h3>
        
        <label>Vehicle You're Applying For</label>
        <input type="text" name="vehicle" placeholder="e.g. 2010 Ford F-150 FX4 SuperCab 4WD" required>

        <label>Price of Vehicle</label>
        <input type="text" name="vehicle_price" placeholder="£" required>

        <label>Deposit Amount</label>
        <input type="text" name="deposit" placeholder="£">

        <label>Preferred Monthly Budget</label>
        <input type="text" name="monthly_budget" placeholder="£">

        <label>Preferred Finance Term</label>
        <select name="finance_term" required>
          <option value="">Select...</option>
          <option value="12 months">12 months</option>
          <option value="24 months">24 months</option>
          <option value="36 months">36 months</option>
          <option value="48 months">48 months</option>
          <option value="60 months">60 months</option>
        </select>
      </div>

      <!-- 7. Consent & Declarations -->
      <div class="form-section">
        <h3>Consent & Declarations</h3>
        <div class="checkbox-group">
          <label><input type="checkbox" name="credit_check" required> I authorise a credit check to be performed (soft or hard search as required).</label>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox" name="gdpr" required> I consent to my data being processed in accordance with GDPR and the Privacy Policy.</label>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox" name="info_correct" required> I confirm that the information provided is accurate and complete.</label>
        </div>
      </div>

      <button type="submit" class="btn">Submit Finance Application</button>
    </form>
  </div>
</body>
</html>
